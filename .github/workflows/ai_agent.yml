name: Run MCJP AI Agent Ledger Updates

on:
  workflow_dispatch: # Allows you to trigger the AI agent manually with a single click
  schedule:
    - cron: '0 0 * * *' # Automatically runs every night at midnight to process new inputs

jobs:
  update-ledger:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the AI script permission to commit updates directly back to GitHub

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install Google GenAI SDK
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Execute AI Agent Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_ledger.py

    - name: Commit & Deploy Live Updates to Netlify
      run: |
        git config --global user.name "MCJP AI Agent"
        git config --global user.email "agent@middleclassjantaparty.org"
        git add index.html
        # Only commit if changes were actually made by the script
        git diff-index --quiet HEAD || git commit -m "chore: automated AI update to live ledger index"
        git push
