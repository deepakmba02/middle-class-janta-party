name: Run MCJP AI Agent Ledger Updates

on:
  workflow_dispatch:
    inputs:
      user_rant:
        description: 'The user complaint text'
        required: true
      location:
        description: 'Where it happened'
        required: true
      category:
        description: 'Category of the burden'
        required: true

jobs:
  update-ledger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install Google GenAI SDK
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Execute AI Agent Script with Live Data
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Passes the input from Make directly into your python command line arguments
      run: python update_ledger.py "${{ github.event.inputs.user_rant }}"

    - name: Commit & Deploy Live Updates to Netlify
      run: |
        git config --global user.name "MCJP AI Agent"
        git config --global user.email "agent@middleclassjantaparty.org"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "chore: live submission ledger update"
        git push
